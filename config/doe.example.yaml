version: 1  # DOE schema version (required, currently only version 1 is supported)

# dataset: fixed facts about your data (do not vary these in the grid)
dataset:  # fixed dataset facts (do not vary these across cases)
  task_type: regression  # task for this DOE (classification or regression)
  target_column: "FP Exp."  # column used as prediction target
  source:  # dataset source configuration
    type: local_csv  # source type (local_csv, chembl, tdc, http_csv depending on profile)
    path: local_data/flash_dataset.csv  # path to local input CSV
  smiles_column: SMILES  # column containing SMILES strings

# defaults: applied to every generated case
defaults:  # applied to every generated case before search_space factors
  global.base_dir: data/flash_doe  # base working directory for intermediate files
  global.random_state: 42  # root random seed
  global.runs.enabled: true  # enable run-style output folders
  split.mode: holdout  # options: holdout, cv, nested_holdout_cv
  split.test_size: 0.2  # holdout only: fraction of full dataset used as test
  split.val_size: 0.1  # holdout only: fraction of full dataset used as validation
  split.require_disjoint: true  # enforce no overlap between train/val/test rows
  split.require_full_test_coverage: true  # fail if any originally assigned test rows are dropped after cleaning
  train.tuning.method: fixed  # options: fixed, train_cv

# search_space: only the fields you want to vary (grid axes)
search_space:  # grid axes (only fields you want to vary)
  split.strategy: [random, scaffold]  # random/scaffold supported for holdout/cv/nested modes
  train.model.type: [random_forest, xgboost]  # models to compare
  pipeline.feature_input: [use.curated_features, featurize.rdkit]  # feature input node variants

# output: where generated config files + manifest/summary are written
output:  # where generated DOE artifacts are written
  dir: config/generated/flash_doe  # output folder for configs, manifest, and summary

# constraints: optional generation/runtime safety limits
constraints:  # generation/runtime safety options
  # true by default: each generated case gets unique base_dir/run_dir/id
  isolate_case_artifacts: true  # keep each case isolated to prevent artifact collisions
